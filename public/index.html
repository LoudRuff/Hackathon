<html class="dark">

<head>
  <meta charset="utf-8" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700;900&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <!-- TensorFlow.js Library -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <!-- COCO-SSD Model (Detects 80+ objects) -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>


<style>
  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
  }

  .scanline-overlay {
    display: none;
  }

  .night-vision-filter {
    filter: none;
  }

  .pulse-glow {
    animation: none;
  }
</style>

<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          primary: "#2563EB",
          background: "#F8FAFC",
          surface: "#FFFFFF",
          text: "#0F172A",
          subtext: "#64748B",
          border: "#E2E8F0",
          success: "#22C55E"
        }
      }
    }
  }
</script>

<style>
  body {
    min-height: max(884px, 100dvh);
  }
</style>

<body class="bg-[#F8FAFC] overflow-hidden select-none">

  <!-- HEADER -->
  <header
    class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-6 py-4 bg-white border-b border-gray-200">
    <div class="flex items-center gap-3">
      <span class="material-symbols-outlined text-[#2563EB] text-2xl">visibility</span>
      <h1 class="font-semibold text-[#0F172A] text-lg">
        Vision Assistant
      </h1>
    </div>

    <div class="flex items-center gap-2">
      <div class="w-2 h-2 bg-green-500 rounded-full"></div>
      <span class="text-green-600 text-sm font-medium">
        Active
      </span>
    </div>
  </header>

  <!-- MAIN -->
  <main id="hello"
    class="relative h-screen w-screen flex flex-col items-center justify-start pt-24 px-4 bg-[#F8FAFC]">

    <!-- STATUS CARD -->
    <div
      class="w-full max-w-md bg-white border border-gray-200 p-5 text-center rounded-2xl shadow-sm">
      <h2 class="text-[#0F172A] text-lg font-semibold tracking-wide">
        Ready to Assist
      </h2>
      <p class="text-gray-500 text-sm mt-2">
        Tap anywhere and speak your command
      </p>
    </div>

    <!-- CAMERA VIEW -->
    <div
      class="relative w-full max-w-md aspect-video mt-6 border border-gray-200 bg-black rounded-2xl overflow-hidden shadow-md">

      <video id="webcam"
        class="hidden w-full h-full object-cover"
        autoplay muted playsinline></video>

      <canvas id="overlay"
        class="absolute inset-0 pointer-events-none"></canvas>

      <div id="viewfinder-idle"
        class="absolute inset-0 flex flex-col items-center justify-center text-gray-400">
        <span class="text-lg font-medium">Camera Off</span>
        <span class="text-sm">Tap to activate</span>
      </div>
    </div>

  
    
    <button class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-50"></button>

  </main>
</body>

<script>
const entryNote = document.querySelector('#hello');
const statusTitle = document.querySelector('h2');
const statusSubtext = document.querySelector('p');

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = new SpeechRecognition();
recognition.lang = 'en-US';
recognition.continuous = true;

let model = null;
let modelPromise = cocoSsd.load();

let cameraOn = false;
let targetObject = null;
let navigating = false;
let currentDirection = null;
let currentSize = 0;
let lastSpoken = 0;

const objectMap = {
  slipper: "shoe",
  shoes: "shoe",
  sandal: "shoe",
  bottle: "bottle",
  cup: "cup",
  mug: "cup",
  phone: "cell phone",
  mobile: "cell phone",
  bag: "handbag",
  backpack: "backpack",
  chair: "chair",
  table: "dining table"
};

function speak(text) {
  const msg = new SpeechSynthesisUtterance(text);
  window.speechSynthesis.cancel();

  msg.onend = () => {
    recognition.start();
  };

  window.speechSynthesis.speak(msg);
}

async function getAIResponse(prompt) {
  try {
    const res = await fetch('/api/ai', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt })
    });

    const data = await res.json();
    return data.answer || "Move forward";

  } catch {
    return "Move forward";
  }
}

entryNote.addEventListener('click', () => {
  recognition.start();
  speak("System active. Say find item.");
});

recognition.onresult = async (event) => {
  const text = event.results[event.results.length - 1][0].transcript.toLowerCase().trim();
  statusSubtext.innerText = text;

  if (text.includes("find item")) {
    await startCamera();
    speak("Camera started. Say object name.");
    return;
  }

  if (text.includes("find")) {
    let item = text.replace("find", "").trim();
    targetObject = item;
    navigating = false;
    speak("Rotate camera to find " + targetObject);
    return;
  }

  if (text.includes("start")) {
    navigating = true;
    speak("Navigation started. Tap for next step.");
    return;
  }

  if (text.includes("what is in front")) {
    describeSceneAI();
    return;
  }
};

async function startCamera() {
  const video = document.getElementById('webcam');
  const canvas = document.getElementById('overlay');
  const ctx = canvas.getContext('2d');

  if (!model) model = await modelPromise;

  const stream = await navigator.mediaDevices.getUserMedia({
    video: {
      facingMode: "environment",
      width: { ideal: 640 },
      height: { ideal: 480 }
    }
  });

  video.srcObject = stream;
  video.classList.remove('hidden');
  document.getElementById('viewfinder-idle').classList.add('hidden');

  cameraOn = true;

  video.onloadedmetadata = () => {
    canvas.width = video.clientWidth;
    canvas.height = video.clientHeight;
    detect();
  };

  async function detect() {
    const predictions = await model.detect(video);

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    let found = false;

    predictions.forEach(p => {
      ctx.strokeStyle = "#2563EB";
      ctx.lineWidth = 2;
      ctx.strokeRect(...p.bbox);

      ctx.fillStyle = "#2563EB";
      ctx.font = "12px sans-serif";
      ctx.fillText(p.class, p.bbox[0], p.bbox[1] - 5);

      if (targetObject) {
        let search = objectMap[targetObject] || targetObject;
        search = search.replace(/s$/, "");

        if (p.class.includes(search) || search.includes(p.class)) {
          found = true;

          const centerX = canvas.width / 2;
          const objCenter = p.bbox[0] + p.bbox[2] / 2;

          if (objCenter < centerX - 50) currentDirection = "right";
          else if (objCenter > centerX + 50) currentDirection = "left";
          else currentDirection = "center";

          currentSize = p.bbox[2] * p.bbox[3];
        }
      }
    });

    if (targetObject && !found && Date.now() - lastSpoken > 4000) {
      speak("Still searching. Rotate slowly.");
      lastSpoken = Date.now();
    }

    setTimeout(detect, 120);
  }
}

entryNote.addEventListener('dblclick', async () => {
  if (navigating) {
    await giveStep();
  }
});

async function giveStep() {
  if (!currentDirection) {
    speak("Rotate slowly");
    return;
  }

  if (currentSize > 80000) {
    speak("Destination reached");
    navigating = false;
    targetObject = null;
    return;
  }

  const aiText = await getAIResponse(
    `Direction: ${currentDirection}, Size: ${currentSize}. Give short navigation instruction.`
  );

  speak(aiText);
}

async function describeSceneAI() {
  const video = document.getElementById('webcam');
  if (!model || !video.srcObject) {
    speak("Camera not active");
    return;
  }

  const predictions = await model.detect(video);

  if (!predictions.length) {
    speak("I cannot see anything clearly");
    return;
  }

  const objects = predictions.map(p => p.class);

  const res = await getAIResponse(
    `Objects detected: ${objects.join(", ")}. Describe simply for a blind person.`
  );

  speak(res);
}
</script>




</body>

</html>
