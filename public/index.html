<div id="viewfinder" class="absolute bottom-[14px] w-[325px] h-[180px] flex items-center justify-center border-[2px] border-[#00FF41] bg-black overflow-hidden z-10">

  <script>
const entryNote = document.querySelector('#hello');
const statusTitle = document.querySelector('h2');
const statusSubtext = document.querySelector('p');

const liveRegion = document.createElement('div');
liveRegion.setAttribute('aria-live', 'assertive');
liveRegion.classList.add('sr-only');
document.body.appendChild(liveRegion);

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = new SpeechRecognition();
recognition.lang = 'en-US';
recognition.continuous = true;

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playBeep(freq, duration) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.frequency.value = freq;
  osc.start();
  gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
  osc.stop(audioCtx.currentTime + duration);
}

function speak(text) {
  const msg = new SpeechSynthesisUtterance(text);

  msg.onstart = () => {
    statusTitle.innerText = "> TRANSMITTING...";
    liveRegion.innerText = text;
  };

  msg.onend = () => {
    statusTitle.innerText = "> LISTENING...";
    playBeep(220, 0.1);
    if (!waitingForPermission) recognition.start();
  };

  window.speechSynthesis.speak(msg);
}

entryNote.addEventListener('click', async () => {
  if (audioCtx.state === 'suspended') await audioCtx.resume();

  if (waitingForPermission) {
    waitingForPermission = false;

    statusTitle.innerText = "> ACCESS GRANTED";
    statusSubtext.innerText = "STARTING CAMERA...";

    await startSensingVision();
    speak("Vision system active.");
  } else {
    speak("Terminal active. Waiting for your command.");
  }
});

async function getAIResponse(text) {
  statusTitle.innerText = "> PROCESSING SIGNAL...";
  try {
    const res = await fetch('/api/ai', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text })
    });

    const data = await res.json();

    statusTitle.innerText = "> RESPONSE RECEIVED";
    statusSubtext.innerText = data.answer;

    speak(data.answer);
  } catch (err) {
    statusTitle.innerText = "> ERROR: SIGNAL LOST";
    console.error(err);
  }
}

let waitingForPermission = false;
let model = null;

recognition.onresult = async (event) => {
  const transcript = event.results[event.results.length - 1][0].transcript.toLowerCase().trim();

  statusSubtext.innerText = `LAST COMMAND: ${transcript.toUpperCase()}`;

  if (transcript.includes("find item") || transcript.includes("find an item")) {
    waitingForPermission = true;

    recognition.stop();

    statusTitle.innerText = "> AUTH REQUIRED";
    statusSubtext.innerText = "ACTION: CLICK SCREEN TO ENABLE CAMERA";

    speak("Authorization required. Click the screen to enable camera.");
    return;
  }

  if (transcript.includes("hello")) {
    speak("Hello. All systems are operational.");
    return;
  }

  if (transcript.includes("status")) {
    speak("System status: Fully operational.");
    return;
  }

  if (!waitingForPermission) {
    await getAIResponse(transcript);
  }
};

async function startSensingVision() {
  const video = document.getElementById('webcam');
  const canvas = document.getElementById('overlay');
  const ctx = canvas.getContext('2d');

  try {
    if (!model) model = await cocoSsd.load();

    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
    video.srcObject = stream;
    video.classList.remove('hidden');
    document.getElementById('viewfinder-idle').classList.add('hidden');

    video.onloadedmetadata = () => {
      canvas.width = video.clientWidth;
      canvas.height = video.clientHeight;

      const detect = async () => {
        const predictions = await model.detect(video);

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        predictions.forEach(p => {
          ctx.strokeStyle = "#00FF41";
          ctx.lineWidth = 2;
          ctx.strokeRect(...p.bbox);

          ctx.fillStyle = "#00FF41";
          ctx.font = "12px Space Grotesk";
          ctx.fillText(p.class, p.bbox[0], p.bbox[1] - 5);
        });

        requestAnimationFrame(detect);
      };

      detect();
    };
  } catch (err) {
    console.error(err);
    speak("Camera access failed.");
  }
}
</script>
